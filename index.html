  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PZZ71NWCL2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

  <style>
    body { font-family: 'M PLUS Rounded 1c', 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .hidden { display: none; }

    /* 車 */
    .car-icon { transition: transform 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045), opacity 0.8s ease-out; cursor: pointer; }
    .car-icon.departing { transform: translateX(150vw) rotate(10deg); opacity: 0; }

    /* おしまい */
    .finish-popup { animation: bounce-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes bounce-in { 0% { opacity:0; transform: scale(0.3);} 100%{opacity:1; transform: scale(1);} }

/* ===== 風船レイヤー（背面表示 & UIは前面） ===== */
.balloon-stage{
  position: relative;
  overflow: hidden; /* visible → hidden */
}

.balloon-bg {
  position: absolute;
  inset: 0;
  z-index: 0;            /* 背面 */
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;  /* 背面は基本クリック不可（クリックは別レイヤーで取る） */
}

#balloonWrap{
  transform:
    translateY(var(--balloonShiftY, 0px))
    scale(var(--balloonScale, 1));
  transform-origin: 50% 80%;
}

/* 風船そのもの（JSで transform: scale() される） */
#balloonWrap {
  position: relative;
  will-change: transform;
}

/* タイマー/説明は前面、かつタップを邪魔しない */
.balloon-ui {
  position: relative;
  z-index: 20;           /* 前面 */
  pointer-events: none;  /* ここはタップ透過 */
}

/* 上のUIを半透明に（風船が透けて見える） */
.balloon-ui{
  background: rgba(255,255,255,0.85); /* 0.55 → 0.85 */
  backdrop-filter: blur(4px);
  border-radius: 16px;
  padding: 12px;
  position: relative;
  z-index: 40; /* 念のため前面固定 */
}

/* ただし下の操作ボタンは押せるように戻す */
.balloon-actions {
  position: relative;
  z-index: 30;
  pointer-events: auto;
}

/* balloonAreaの中だけでタップ領域を管理（下のボタンを覆わない） */
#balloonArea { position: relative; }
#balloonBtn{
  background: transparent;
  border: none;
  padding: 0;
  width: fit-content;
  height: fit-content;
}

    /* 風船：ぷるぷる（scaleはCSS変数を使う） */
   @keyframes wobble {
  0%   { transform: translateY(var(--balloonShiftY, 0px)) scale(var(--balloonScale, 1)) rotate(0deg); }
  25%  { transform: translateY(var(--balloonShiftY, 0px)) scale(var(--balloonScale, 1)) rotate(-3deg); }
  50%  { transform: translateY(var(--balloonShiftY, 0px)) scale(var(--balloonScale, 1)) rotate(3deg); }
  75%  { transform: translateY(var(--balloonShiftY, 0px)) scale(var(--balloonScale, 1)) rotate(-2deg); }
  100% { transform: translateY(var(--balloonShiftY, 0px)) scale(var(--balloonScale, 1)) rotate(0deg); }
}
.wobble { animation: wobble 0.45s ease-in-out infinite; transform-origin: 50% 85%; }

    /* ★カード外枠：赤枠ちかちか（風船に隠れない） */
    @keyframes alertFrameFlash {
  0%, 100% { box-shadow: inset 0 0 0 0 rgba(239,68,68,0); }
  50%      { box-shadow: inset 0 0 0 12px rgba(239,68,68,0.9); }
}
    .alert-frame {
      animation: alertFrameFlash 0.6s ease-in-out infinite;
      border-radius: 1.5rem; /* rounded-2xl相当 */
    }

    /* 選択UI */
    .choice-radio:checked + .choice-card {
      outline: 3px solid rgba(236,72,153,0.45);
      box-shadow: 0 10px 30px rgba(236,72,153,0.18);
      transform: translateY(-1px);
    }

    /* ★汗：ポタポタ（SVG内テキストに効く） */
    .drip {
      transform-box: fill-box;
      transform-origin: center;
      animation: dripFall 1.05s ease-in-out infinite;
    }
    .drip.d2 { animation-delay: 0.22s; }
    .drip.d3 { animation-delay: 0.44s; }
    @keyframes dripFall {
      0%   { transform: translateY(-2px); opacity: 0; }
      12%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { transform: translateY(18px); opacity: 0; }
    }
  </style>
</head>

  <!-- ===== 問い合わせフォームJS ===== -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const contactButton = document.getElementById("contactButton");
      const feedbackForm = document.getElementById("feedbackForm");
      const closeFeedback = document.getElementById("closeFeedback");
      const feedbackSubmitForm = document.getElementById("feedbackSubmitForm");
      const feedbackThanks = document.getElementById("feedbackThanks");
      const closeThanks = document.getElementById("closeThanks");

      contactButton.addEventListener("click", () => feedbackForm.classList.remove("hidden"));
      closeFeedback.addEventListener("click", () => feedbackForm.classList.add("hidden"));

      feedbackSubmitForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const appName = document.getElementById("appName").value;
        const feedbackType = document.getElementById("feedbackType").value;
        const content = document.getElementById("content").value;
        const email = document.getElementById("email").value;

        if (!appName) { alert("アプリを選択してください。"); return; }

        const subject = encodeURIComponent(`[${appName}] 問い合わせ: ${feedbackType}`);
        const body = encodeURIComponent(
          `アプリ：${appName}\n種別：${feedbackType}\n\n内容：\n${content}\n\nメール：${email || "未記入"}`
        );

        window.location.href = `mailto:info.fukushi@allcare.co.jp?subject=${subject}&body=${body}`;
        feedbackSubmitForm.classList.add("hidden");
        feedbackThanks.classList.remove("hidden");
      });

      closeThanks.addEventListener("click", () => {
        feedbackForm.classList.add("hidden");
        feedbackSubmitForm.classList.remove("hidden");
        feedbackThanks.classList.add("hidden");
        feedbackSubmitForm.reset();
      });
    });
  </script>

      // ===== 紙吹雪：Canvasごとのエンジン（干渉しない） =====
      class ConfettiEngine {
        constructor(canvas) {
          this.canvas = canvas;
          this.ctx = null;
          this.raf = 0;
          this.particles = [];
        }

        resize() {
          const c = this.canvas;
          const dpr = devicePixelRatio || 1;
          c.width = Math.floor(c.clientWidth * dpr);
          c.height = Math.floor(c.clientHeight * dpr);
          this.ctx = c.getContext('2d');
          this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        burst() {
          const c = this.canvas;
          const w = c.clientWidth;
          const h = c.clientHeight;
          const count = 140;

          this.particles = [];
          for (let i = 0; i < count; i++) {
            this.particles.push({
              x: w / 2,
              y: h * 0.35,
              vx: (Math.random() * 10 - 5),
              vy: (Math.random() * -10 - 2),
              g: 0.18 + Math.random() * 0.14,
              r: 2 + Math.random() * 4,
              a: 1,
              spin: (Math.random() * 0.25 - 0.125),
              rot: Math.random() * Math.PI,
              c: ['#fb7185','#60a5fa','#34d399','#fbbf24','#a78bfa'][Math.floor(Math.random()*5)]
            });
          }
        }

        start() {
          this.stop();
          this.resize();
          this.burst();

          const draw = () => {
            const ctx = this.ctx;
            const c = this.canvas;
            if (!ctx) return;

            ctx.clearRect(0, 0, c.clientWidth, c.clientHeight);

            this.particles.forEach(p => {
              p.x += p.vx;
              p.y += p.vy;
              p.vy += p.g;
              p.a *= 0.992;
              p.rot += p.spin;

              ctx.save();
              ctx.globalAlpha = Math.max(0, p.a);
              ctx.translate(p.x, p.y);
              ctx.rotate(p.rot);
              ctx.fillStyle = p.c;
              ctx.fillRect(-p.r, -p.r, p.r * 2.2, p.r * 1.4);
              ctx.restore();
            });

            this.particles = this.particles.filter(p => p.a > 0.08 && p.y < c.clientHeight + 40);
            if (this.particles.length > 0) {
              this.raf = requestAnimationFrame(draw);
            }
          };

          this.raf = requestAnimationFrame(draw);
        }

        stop() {
          cancelAnimationFrame(this.raf);
          this.raf = 0;
        }
      }

      // ===== 風船タイマー本体 =====
      let popped = false;

      // ★成長：初期を小さく / 最後は画面いっぱい
      const BALLOON_START_SCALE = 0.28;
      const BALLOON_END_SCALE   = 2.65;

      // ★iPhone対策：Date.now基準で経過を取る（タブ停止/復帰にも強い）
      let balloonStartEpoch = 0;
      let lastStateSaveAt = 0;

      // ★アクション段階（成長と並行）
      // 0: 何もなし
      // 1: 汗1滴
      // 2: 汗3滴
      // 3: ぷるぷる
      // 4: 赤枠
      let stageApplied = -1;
      function stageFromProgress(p) {
        if (p < 0.20) return 0;
        if (p < 0.40) return 1;
        if (p < 0.60) return 2;
        if (p < 0.80) return 3;
        return 4;
      }

      function fmtMMSS(ms) {
        const total = Math.max(0, Math.ceil(ms / 1000));
        const m = String(Math.floor(total / 60)).padStart(2, '0');
        const s = String(total % 60).padStart(2, '0');
        return `${m}:${s}`;
      }

      function setBalloonScale(scale) {
  balloonWrap.style.setProperty('--balloonScale', scale);

  const shiftY = Math.max(0, (scale - 1) * 18);
  balloonWrap.style.setProperty('--balloonShiftY', `${shiftY}px`);
}

      function renderBalloon(type) {

      function getSweatLayer() {

      function setFace(mode) {
  const normal = balloonWrap.querySelector('[data-face="normal"]');
  const strain = balloonWrap.querySelector('[data-face="strain"]');
  if (!normal || !strain) return;

  if (mode === 'strain') {
    normal.setAttribute('opacity', '0');
    strain.setAttribute('opacity', '1');
  } else {
    normal.setAttribute('opacity', '1');
    strain.setAttribute('opacity', '0');
  }
}

      // stage: 0=1滴, 1=3滴（UI段階に合わせて使う）
      function setSweat(stage) {
        const sweat = getSweatLayer();
        if (!sweat) return;

        if (stage < 0) {
          sweat.setAttribute('opacity', '0');
          sweat.innerHTML = `<text class="drip d1" x="190" y="95" font-size="32">💧</text>`;
          return;
        }

        sweat.setAttribute('opacity', '1');

        if (stage === 0) {
          sweat.innerHTML = `<text class="drip d1" x="190" y="95" font-size="32">💧</text>`;
          return;
        }

        sweat.innerHTML = `
          <text class="drip d1" x="190" y="95" font-size="32">💧</text>
          <text class="drip d2" x="168" y="115" font-size="28">💧</text>
          <text class="drip d3" x="205" y="120" font-size="28">💧</text>
        `;
      }

      function clearActions() {
  setSweat(-1);
  balloonWrap.classList.remove('wobble');
  balloonCard.classList.remove('alert-frame');
  setFace('normal'); // ★追加
}

      function resetBalloonVisual() {
        popped = false;
        stageApplied = -1;

        tapBadge.classList.remove('hidden');
        balloonWrap.style.transform = ''; // ★popで付いたinline transformを消す

        balloonWrap.style.transition = '';
        balloonWrap.style.opacity = '1';
        balloonWrap.style.filter = 'none';

        clearActions();
        setBalloonScale(BALLOON_START_SCALE);
        balloonTimerEl.textContent = fmtMMSS(balloonDurationMs);

        timeMeter.style.width = '100%';
        timeMeter.style.backgroundColor = '#34d399';
      }

      function applyStage(stage) {
  if (stage === stageApplied) return;
  stageApplied = stage;

  clearActions();

  // 1: 汗1滴
  if (stage === 1) setSweat(0);

  // 2: 汗3滴
  if (stage === 2) setSweat(1);

  // 3: ぷるぷる
  if (stage >= 3) {
    balloonWrap.classList.add('wobble');
    setFace('strain');
  }

  // 4: 赤枠（カード外枠）
  if (stage >= 4) {
    balloonCard.classList.add('alert-frame');
    setFace('strain');
  }
}

      function easeInOutCubic(p) {
        return (p < 0.5)
          ? 4 * p * p * p
          : 1 - Math.pow(-2 * p + 2, 3) / 2;
      }

      function saveBalloonState(running) {
        // 1秒に1回だけ保存（負荷軽減）
        const now = Date.now();
        if (now - lastStateSaveAt < 1000) return;
        lastStateSaveAt = now;

        sessionStorage.setItem('balloonState', JSON.stringify({
          running: running,
          popped: popped,
          startEpoch: balloonStartEpoch,
          durationMs: balloonDurationMs,
          type: currentBalloonType
        }));
      }

      function clearBalloonState() {
        sessionStorage.removeItem('balloonState');
      }

      function startBalloonGrowth() {
        cancelAnimationFrame(balloonRaf);

        const tick = () => {
          const nowEpoch = Date.now();
          const elapsed = nowEpoch - balloonStartEpoch;

          const pRaw = balloonDurationMs > 0 ? elapsed / balloonDurationMs : 1;
          const p = Math.min(1, Math.max(0, pRaw));

          // タイマー表示
          const remaining = Math.max(0, balloonDurationMs - elapsed);
          balloonTimerEl.textContent = fmtMMSS(remaining);

          // 視覚メーター（残り割合）
          const progress = Math.max(0, 1 - p);
          timeMeter.style.width = `${progress * 100}%`;
          if (progress > 0.66) timeMeter.style.backgroundColor = '#34d399';
          else if (progress > 0.33) timeMeter.style.backgroundColor = '#fbbf24';
          else timeMeter.style.backgroundColor = '#ef4444';

          // 成長（全時間で気持ちよく伸びる）
          const eased = easeInOutCubic(p);
          const scale = BALLOON_START_SCALE + (BALLOON_END_SCALE - BALLOON_START_SCALE) * eased;
          setBalloonScale(scale);

          // アクション（成長と並行）
          applyStage(stageFromProgress(p));

          // 状態保存（途中でSafariが落ちても復帰）
          saveBalloonState(true);

          // 継続
          if (!popped) {
            balloonRaf = requestAnimationFrame(tick);
          }
        };

        balloonRaf = requestAnimationFrame(tick);
      }

      function openBalloonScreen() {
        settingsScreen.classList.add('hidden');
        mainScreen.classList.add('hidden');
        balloonScreen.classList.remove('hidden');
      }

      function popBalloon() {
        if (popped) return;
        popped = true;

        tapBadge.classList.add('hidden');
        cancelAnimationFrame(balloonRaf);

        // 演出停止
        clearActions();

        // さっと縮んで消える
        balloonWrap.style.transition = 'transform 220ms ease, opacity 220ms ease, filter 220ms ease';
        setBalloonScale(BALLOON_START_SCALE);
        balloonWrap.style.opacity = '0';
        balloonWrap.style.filter = 'blur(2px)';

        // ここで状態クリア（完了）
        clearBalloonState();

        setTimeout(() => { openCelebrate(); }, 180);
      }

      // ===== 風船：開始/操作 =====
      balloonStartBtn.addEventListener('click', () => {
        const minutes = clampMinutes(parseInt(balloonMinutesInput.value || '3'));
        balloonMinutesInput.value = minutes;
        balloonDurationMs = minutes * 60 * 1000;

        currentBalloonType = getSelectedBalloonType();

        openBalloonScreen();
        renderBalloon(currentBalloonType);
        resetBalloonVisual();

        // 開始時刻を保存（Date.now基準）
        balloonStartEpoch = Date.now();
        lastStateSaveAt = 0;

        // state保存
        sessionStorage.setItem('balloonState', JSON.stringify({
          running: true,
          popped: false,
          startEpoch: balloonStartEpoch,
          durationMs: balloonDurationMs,
          type: currentBalloonType
        }));

        startBalloonGrowth();
      });

      balloonBtn.addEventListener('click', popBalloon);

      balloonRestart.addEventListener('click', () => {
        closeCelebrate();
        renderBalloon(currentBalloonType);
        resetBalloonVisual();

        balloonStartEpoch = Date.now();
        lastStateSaveAt = 0;

        sessionStorage.setItem('balloonState', JSON.stringify({
          running: true,
          popped: false,
          startEpoch: balloonStartEpoch,
          durationMs: balloonDurationMs,
          type: currentBalloonType
        }));

        startBalloonGrowth();
      });

      balloonBack.addEventListener('click', () => {
        cancelAnimationFrame(balloonRaf);
        closeCelebrate();
        clearBalloonState();
        balloonScreen.classList.add('hidden');
        settingsScreen.classList.remove('hidden');
      });

      celebrateClose.addEventListener('click', closeCelebrate);

      // ===== 風船：復帰（iPhoneで途中で戻る問題対策） =====
      try {
        const saved = JSON.parse(sessionStorage.getItem('balloonState') || 'null');
        if (saved && saved.running && saved.startEpoch && saved.durationMs && !saved.popped) {
          balloonDurationMs = saved.durationMs;
          currentBalloonType = saved.type || 'round';
          balloonStartEpoch = saved.startEpoch;

          openBalloonScreen();
          renderBalloon(currentBalloonType);
          resetBalloonVisual();
          startBalloonGrowth();
        }
      } catch (e) {}

      // ===== 画面リサイズで紙吹雪Canvasを追従 =====
      window.addEventListener('resize', () => {
        if (!celebrateOverlay.classList.contains('hidden')) balloonConfetti.resize();
        if (!finishMessage.classList.contains('hidden')) carConfetti.resize();
      });

    });
  </script>
</body>
</html>
